<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>해양안심ON</title> <style> *{ margin:0; padding:0; box-sizing:border-box; font-family:'Pretendard',sans-serif; } body{ background:#eef3fb; padding:20px; color:#111; } .main-wrap{ max-width:430px; margin:auto; } .screen{ display:none; } .active{ display:block; } .card{ background:white; border-radius:28px; padding:24px; box-shadow:0 10px 25px rgba(0,0,0,0.08); margin-bottom:20px; } /* 로고 */ .logo{ font-size:42px; font-weight:900; text-align:center; margin-bottom:40px; } .logo span{ font-size:42px; font-weight:900; color:#003f88; } /* 토글 */ .toggle-off{ width:140px; height:70px; background:#d9d9d9; border-radius:50px; margin:25px auto; position:relative; cursor:pointer; transition:0.3s; } .toggle-circle{ width:58px; height:58px; background:white; border-radius:50%; position:absolute; left:6px; top:6px; transition:0.3s; } .toggle-on{ background:#16c35b !important; } .move-circle{ left:76px; } /* 버튼 */ .main-btn{ width:100%; padding:18px; border:none; border-radius:18px; background:#003f88; color:white; font-size:22px; font-weight:bold; margin-top:20px; cursor:pointer; } .back-btn{ width:100%; padding:16px; border:none; border-radius:18px; background:#dfe5ef; color:#333; font-size:20px; font-weight:bold; margin-top:15px; cursor:pointer; } /* 메뉴 */ .menu{ width:100%; padding:22px; border:none; border-radius:20px; margin-bottom:15px; font-size:23px; font-weight:bold; display:flex; align-items:center; cursor:pointer; } .num{ width:44px; height:44px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-right:15px; font-weight:bold; flex-shrink:0; } .menu1{ background:#eaf2ff; color:#003f88; } .menu2{ background:#fff0eb; color:#ff5b2e; } .menu3{ background:#fff5cf; color:#d19a00; } .menu4{ background:#e7fff3; color:#009966; } .menu5{ background:#eef1ff; color:#4b63ff; } /* 지역 버튼 */ .region-btn{ width:100%; padding:20px; border:none; border-radius:18px; background:#003f88; color:white; font-size:24px; font-weight:bold; margin-bottom:14px; cursor:pointer; } /* 공통 */ .top-info{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; } .top-left{ text-align:left; } .top-title{ font-size:30px; font-weight:900; } .top-sub{ font-size:19px; margin-top:5px; } .update{ font-size:16px; font-weight:bold; color:#666; margin-top:8px; } /* 기상 */ .weather-top{ display:flex; justify-content:center; align-items:center; gap:12px; margin-top:15px; } .temp{ font-size:72px; font-weight:900; } .weather-icon{ font-size:70px; } .weather-desc{ font-size:24px; margin-top:5px; font-weight:bold; } .section-box{ background:#f5f7fb; padding:20px; border-radius:20px; margin-top:20px; } .section-title{ font-size:24px; font-weight:bold; margin-bottom:15px; text-align:center; } .time-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; text-align:center; } .time-item{ font-size:18px; font-weight:bold; line-height:1.8; } /* 위험 박스 */ .warning-red{ background:linear-gradient(to right,#ff4b4b,#d90000); color:white; padding:24px; border-radius:22px; margin-top:25px; text-align:center; } .warning-yellow{ background:#ffd84d; padding:24px; border-radius:22px; margin-top:25px; text-align:center; } .warning-green{ background:#16a765; color:white; padding:24px; border-radius:22px; margin-top:25px; text-align:center; } .warning-title{ font-size:46px; font-weight:900; } .warning-sub{ font-size:22px; margin-top:12px; font-weight:bold; } /* 정보 정렬 */ .info-line{ display:flex; justify-content:space-between; font-size:19px; font-weight:bold; margin-top:20px; line-height:1.8; } /* 안전수칙 */ .rule-item{ display:flex; gap:18px; padding:20px 0; border-bottom:1px solid #eee; font-size:20px; font-weight:bold; line-height:1.8; } .rule-icon{ font-size:38px; } /* SOS */ .sos-title{ font-size:38px; font-weight:900; text-align:center; margin-bottom:25px; } .sos-top{ font-size:24px; font-weight:bold; line-height:1.6; text-align:center; } .sos-number{ font-size:100px; font-weight:900; color:red; text-align:center; margin-top:20px; } .phone{ font-size:110px; text-align:center; margin-top:10px; animation:ring 1s infinite; } @keyframes ring{ 0%{transform:rotate(0);} 25%{transform:rotate(-10deg);} 50%{transform:rotate(10deg);} 75%{transform:rotate(-10deg);} 100%{transform:rotate(0);} } </style> </head> <body> <div class="main-wrap"> <!-- 첫화면 --> <div class="screen active" id="screen1"> <div class="card"> <div class="logo"> 해양안심<span>ON</span> </div> <div id="toggleBox" class="toggle-off" onclick="toggleSafety()"> <div class="toggle-circle"></div> </div> <h1 id="toggleText" style=" text-align:center; margin-top:30px; font-size:40px; font-weight:900; color:#888; "> SAFETY OFF </h1> <p id="safeText" style=" text-align:center; font-size:26px; font-weight:900; margin-top:28px; color:#003f88; "> 안전을 켜시겠습니까? </p> <div id="locationBox" style=" display:none; margin-top:35px; font-size:24px; font-weight:bold; text-align:center; line-height:1.6; "> 현재 위치 태안군 몽산포 해변 <br><br> 현재 시간 오전 11:30 </div> <button id="startBtn" class="main-btn" style="display:none;" onclick="goScreen('screen2')"> 시작하기 </button> </div> </div> <!-- 보이는ARS --> <div class="screen" id="screen2"> <div class="card"> <h2 style=" font-size:38px; text-align:center; "> 보이는 ARS </h2> <p style=" font-size:26px; font-weight:bold; margin-top:20px; margin-bottom:25px; text-align:center; "> 어떤 정보를 찾으시나요? </p> <button class="menu menu1" onclick="goRegion('weather')"> <span class="num">1</span> 기상정보 </button> <button class="menu menu2" onclick="goRegion('mud')"> <span class="num">2</span> 해루질 위험 안내 </button> <button class="menu menu3" onclick="goRegion('wave')"> <span class="num">3</span> 이안류 위험 정보 </button> <button class="menu menu4" onclick="goRegion('wind')"> <span class="num">4</span> 풍랑 특보 </button> <button class="menu menu5" onclick="goScreen('safe')"> <span class="num">5</span> 안전수칙 안내 </button> <button class="menu" style=" background:#ff3b30; color:white; justify-content:center; " onclick="goScreen('sos')"> 긴급 SOS 연결 </button> </div> </div> <!-- 지역선택 --> <div class="screen" id="regionSelect"> <div class="card"> <h2 style=" font-size:34px; text-align:center; margin-bottom:25px; "> 지역 선택 </h2> <button class="region-btn" onclick="selectRegion('동해 지역 기상정보','속초 해수욕장')"> 동해 </button> <button class="region-btn" onclick="selectRegion('서해 지역 기상정보','태안군 몽산포 해변')"> 서해 </button> <button class="region-btn" onclick="selectRegion('남해 지역 기상정보','거제 구조라 해수욕장')"> 남해 </button> <button class="region-btn" onclick="selectRegion('제주 지역 기상정보','협재 해수욕장')"> 제주 </button> <button class="back-btn" onclick="goScreen('screen2')"> 이전으로 </button> </div> </div> <script> function hideAll(){ document.querySelectorAll(".screen").forEach(screen=>{ screen.style.display="none"; }); } function goScreen(id){ hideAll(); document.getElementById(id).style.display="block"; } let safetyOn = false; function toggleSafety(){ const box = document.getElementById("toggleBox"); const circle = document.querySelector(".toggle-circle"); const text = document.getElementById("toggleText"); const btn = document.getElementById("startBtn"); const location = document.getElementById("locationBox"); safetyOn = !safetyOn; if(safetyOn){ box.classList.add("toggle-on"); circle.classList.add("move-circle"); text.innerHTML = "SAFETY ON"; text.style.color = "#16c35b"; btn.style.display = "block"; location.style.display = "block"; document.getElementById("safeText").style.display = "none"; }else{ box.classList.remove("toggle-on"); circle.classList.remove("move-circle"); text.innerHTML = "SAFETY OFF"; text.style.color = "#888"; btn.style.display = "none"; location.style.display = "none"; document.getElementById("safeText").style.display = "block"; } } let targetScreen = ""; function goRegion(screen){ targetScreen = screen; goScreen('regionSelect'); } function selectRegion(title, place){ alert(place + " 선택"); } </script> </body> </html>
