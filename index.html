<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해양안심ON</title>

<style>

body{
margin:0;
font-family:'Pretendard',sans-serif;
background:#f4f7fb;
color:#1a1a1a;
}

.header{
background:#0d47a1;
color:white;
padding:22px;
font-size:34px;
font-weight:800;
text-align:center;
}

.section{
padding:25px;
}

.card{
background:white;
border-radius:28px;
padding:25px;
margin-bottom:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title{
font-size:30px;
font-weight:800;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:#666;
margin-bottom:25px;
line-height:1.6;
}

.step{
display:none;
animation:fade 0.4s;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.btn{
width:100%;
padding:22px;
margin-bottom:16px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
cursor:pointer;
}

.blue{background:#2f6fd6;}
.orange{background:#ef8f2f;}
.red{background:#db4437;}
.green{background:#4caf50;}

.mini-btn{
background:#0d47a1;
color:white;
border:none;
padding:16px;
border-radius:14px;
font-size:18px;
width:100%;
margin-top:15px;
}

.menu{
background:#f4f6fa;
padding:18px;
border-radius:16px;
margin-bottom:15px;
font-size:22px;
font-weight:700;
}

.warning{
background:#fff3cd;
padding:22px;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:#856404;
margin-bottom:20px;
}

.danger{
background:#ffebee;
padding:22px;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:#c62828;
margin-bottom:20px;
}

.safe{
background:#e8f5e9;
padding:22px;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-bottom:20px;
}

.wave{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin:30px 0;
}

.wave span{
width:8px;
height:40px;
background:#2f6fd6;
border-radius:10px;
animation:wave 1s infinite;
}

.wave span:nth-child(2){animation-delay:0.1s;}
.wave span:nth-child(3){animation-delay:0.2s;}
.wave span:nth-child(4){animation-delay:0.3s;}
.wave span:nth-child(5){animation-delay:0.4s;}

@keyframes wave{
0%{height:20px;}
50%{height:70px;}
100%{height:20px;}
}

.footer{
text-align:center;
padding:30px;
color:#777;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
해양안심ON
</div>

<div class="section">

<!-- STEP 1 -->
<div class="card step active" id="step1">

<div
