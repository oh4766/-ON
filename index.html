<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>해양안심ON</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#eef3fb;
    color:#123;
}

.header{
    background:#0b3d91;
    color:white;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.toggle-box{
    text-align:center;
    margin:30px 0;
}

.switch{
    position:relative;
    display:inline-block;
    width:90px;
    height:50px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#ccc;
    transition:.4s;
    border-radius:50px;
}

.slider:before{
    position:absolute;
    content:"";
    height:38px;
    width:38px;
    left:6px;
    bottom:6px;
    background:white;
    transition:.4s;
    border-radius:50%;
}

input:checked + .slider{
    background:#00b050;
}

input:checked + .slider:before{
    transform:translateX(40px);
}

.status{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
}

.on{
    color:#00b050;
}

.off{
    color:#888;
}

.menu-btn{
    width:100%;
    border:none;
    padding:20px;
    margin-bottom:15px;
    border-radius:20px;
    font-size:22px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.blue{
    background:#1f6fe5;
}

.orange{
    background:#f39c12;
}

.red{
    background:#e74c3c;
}

.green{
    background:#27ae60;
}

.info-box{
    background:#fff3cd;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
    text-align:center;
}

.warning{
    font-size:36px;
    color:#e67e22;
    font-weight:bold;
}

.voice{
    margin-top:20px;
    text-align:center;
}

.voice button{
    background:#0b3d91;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
}

.footer{
    text-align:center;
    color:#666;
    margin-top:30px;
    margin-bottom:40px;
}

</style>
</head>

<body>

<div class="header">
해양안심ON
</div>

<div class="container">

<div class="card">

<div class="title">
실시간 AI 해양안전 플랫폼
</div>

<div class="subtitle">
QR 기반 접근 + 보이는 ARS + AI 위험 예측
</div>

<div class="toggle-box">

<label class="switch">
<input type="checkbox" id="safeToggle">
<span class="slider"></span>
</label>

<div class="status off" id="statusText">
SAFETY OFF
</div>

</div>

<button class="menu-btn blue" onclick="showWeather()">
기상 정보
</button>

<button class="menu-btn orange" onclick="showDanger()">
해루질 위험 안내
</button>

<button class="menu-btn red" onclick="playVoice()">
음성 브리핑 듣기
</button>

<button class="menu-btn green">
긴급 SOS 연결
</button>

<div class="info-box" id="resultBox">

<div class="warning">
현재 안전 정보를 확인하세요
</div>

<p>
해양활동 전 반드시 위험도를 확인해주세요.
</p>

</div>

<div class="voice">
<button onclick="playVoice()">
🔊 음성 안내 듣기
</button>
</div>

</div>

<div class="footer">
기상청 · 국립해양조사원 · 해양경찰청 공공데이터 기반
</div>

</div>

<script>

const toggle = document.getElementById("safeToggle");
const statusText = document.getElementById("statusText");

toggle.addEventListener("change", function(){

    if(this.checked){
        statusText.innerHTML = "SAFETY ON";
        statusText.className = "status on";
    }else{
        statusText.innerHTML = "SAFETY OFF";
        statusText.className = "status off";
    }

});

function showWeather(){

document.getElementById("resultBox").innerHTML = `
<div class="warning">기상 정보</div>

<p>기온 : 18°C</p>
<p>풍속 : 5m/s</p>
<p>파고 : 0.6m</p>
<p>강수 확률 : 20%</p>
`;

}

function showDanger(){

document.getElementById("resultBox").innerHTML = `
<div class="warning">⚠ 주의</div>

<p>현재 지역은 만조 예정으로</p>
<p>1시간 후 고립 위험 가능성이 있습니다.</p>

<p><b>해루질 활동 주의 필요</b></p>
`;

}

function playVoice(){

const msg = new SpeechSynthesisUtterance(
"현재 지역은 만조 예정으로 해루질 활동 시 주의가 필요합니다."
);

msg.lang = "ko-KR";

speechSynthesis.speak(msg);

}

</script>

</body>
</html>
