<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>해양안심ON</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#eef3fb;
text-align:center;
}

.header{
background:#0b3d91;
color:white;
padding:20px;
font-size:32px;
font-weight:bold;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:white;
padding:30px;
border-radius:25px;
max-width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.fake-toggle{
width:120px;
height:60px;
background:#ddd;
border-radius:50px;
margin:auto;
position:relative;
}

.fake-toggle::before{
content:'';
width:50px;
height:50px;
background:white;
border-radius:50%;
position:absolute;
left:5px;
top:5px;
}

.toggle-on{
width:120px;
height:60px;
background:#00b050;
border-radius:50px;
margin:auto;
position:relative;
}

.circle{
width:50px;
height:50px;
background:white;
border-radius:50%;
position:absolute;
right:5px;
top:5px;
}

.off-text{
margin-top:15px;
font-size:28px;
color:#999;
font-weight:bold;
}

.on-text{
margin-top:15px;
font-size:28px;
color:#00b050;
font-weight:bold;
}

.main-btn{
margin-top:20px;
padding:18px 30px;
border:none;
border-radius:15px;
background:#0b3d91;
color:white;
font-size:22px;
font-weight:bold;
}

.menu{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
color:white;
}

.blue{
background:#1f6fe5;
}

.orange{
background:#f39c12;
}

.red{
background:#e74c3c;
}

.green{
background:#27ae60;
}

.info{
margin-top:20px;
background:#eef5ff;
padding:20px;
border-radius:15px;
font-size:20px;
}

.danger{
margin-top:20px;
background:#fff0f0;
padding:20px;
border-radius:15px;
font-size:20px;
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
해양안심ON
</div>

<!-- STEP 2 -->

<div class="screen active" id="screen1">

<div class="card">

<h2>서비스 접속</h2>

<div class="fake-toggle"></div>

<div class="off-text">
SAFETY OFF
</div>

<p>
안전을 켜시겠습니까?
</p>

<button class="main-btn"
onclick="startSafety()">
ON 시작하기
</button>

</div>

</div>

<!-- STEP 3 -->

<div class="screen" id="screen2">

<div class="card">

<h2>해양안심ON</h2>

<div class="toggle-on">

<div class="circle"></div>

</div>

<div class="on-text">
SAFETY ON
</div>

<p>
현재 위치<br>
태안군 몽산포 해변
</p>

<button class="main-btn"
onclick="showMenu()">
다음 단계
</button>

</div>

</div>

<!-- STEP 4 -->

<div class="screen" id="screen3">

<div class="card">

<h2>보이는 ARS</h2>

<p>
원하는 정보를 선택하세요.
</p>

<button class="menu blue"
onclick="weatherInfo()">
1 기상정보
</button>

<button class="menu orange"
onclick="dangerInfo()">
2 해루질 위험 안내
</button>

<button class="menu red"
onclick="playVoice()">
3 음성 브리핑
</button>

<button class="menu green">
0 긴급 SOS 연결
</button>

<div id="resultBox"></div>

</div>

</div>

<script>

function startSafety(){

document.getElementById("screen1").style.display = "none";
document.getElementById("screen2").style.display = "block";

}

function showMenu(){

document.getElementById("screen2").style.display = "none";
document.getElementById("screen3").style.display = "block";

}

function weatherInfo(){

document.getElementById("resultBox").innerHTML = `
<div class="info">
🌤 기온 : 18°C<br>
💨 풍속 : 5m/s<br>
🌊 파고 : 0.6m
</div>
`;

}

function dangerInfo(){

document.getElementById("resultBox").innerHTML = `
<div class="danger">
⚠ 현재 지역은 만조 예정으로
1시간 후 고립 위험 가능성이 있습니다.
</div>
`;

}

function playVoice(){

const msg = new SpeechSynthesisUtterance(
"현재 지역은 만조 예정으로 해루질 활동 시 주의가 필요합니다."
);

msg.lang = "ko-KR";

speechSynthesis.speak(msg);

}

</script>

</body>

</html>
