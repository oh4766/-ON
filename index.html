<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해양안심ON</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#eef3fb;
text-align:center;
}

.header{
background:white;
padding:20px;
font-size:40px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.blue{
color:#0A57FF;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:white;
padding:30px;
border-radius:25px;
max-width:420px;
margin:auto;
margin-top:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.fake-toggle{
width:130px;
height:65px;
background:#ddd;
border-radius:50px;
margin:auto;
position:relative;
}

.fake-toggle::before{
content:'';
width:55px;
height:55px;
background:white;
border-radius:50%;
position:absolute;
left:5px;
top:5px;
}

.toggle-on{
width:130px;
height:65px;
background:#1cc95b;
border-radius:50px;
margin:auto;
position:relative;
}

.circle{
width:55px;
height:55px;
background:white;
border-radius:50%;
position:absolute;
right:5px;
top:5px;
}

.off-text{
margin-top:15px;
font-size:30px;
font-weight:bold;
color:#999;
}

.on-text{
margin-top:15px;
font-size:30px;
font-weight:bold;
color:#1cc95b;
}

.main-btn{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#0A57FF;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.menu{
width:100%;
padding:22px;
margin-bottom:15px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
cursor:pointer;
}

.num{
width:42px;
height:42px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:15px;
font-weight:bold;
}

.menu1{
background:#eaf2ff;
color:#0A57FF;
}

.menu2{
background:#fff3e2;
color:#ff8a00;
}

.menu3{
background:#ffeaea;
color:#ff3b3b;
}

.menu4{
background:#eef9ff;
color:#00a2ff;
}

.menu5{
background:#eefcef;
color:#00a651;
}

.sos-btn{
width:100%;
padding:24px;
border:none;
border-radius:20px;
background:red;
color:white;
font-size:28px;
font-weight:bold;
cursor:pointer;
}

.location{
background:#f1f7ff;
padding:20px;
border-radius:20px;
margin-top:20px;
font-size:24px;
}

.warning-box{
background:#ffd84d;
padding:20px;
border-radius:20px;
font-size:48px;
font-weight:bold;
margin-top:20px;
}

.info{
background:#eef5ff;
padding:20px;
border-radius:20px;
margin-top:20px;
font-size:22px;
line-height:2;
text-align:left;
}

.danger{
background:#fff0f0;
padding:20px;
border-radius:20px;
margin-top:20px;
font-size:22px;
font-weight:bold;
color:red;
line-height:1.8;
}

.voice-icon{
font-size:90px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
해양안심<span class="blue">ON</span>
</div>

<!-- STEP1 -->

<div class="screen active" id="screen1">

<div class="card">

<h2>서비스 접속</h2>

<div class="fake-toggle"></div>

<div class="off-text">
SAFETY OFF
</div>

<p style="font-size:24px;">
안전을 켜시겠습니까?
</p>

<button class="main-btn" onclick="startSafety()">
ON 시작하기
</button>

</div>
</div>

<!-- STEP2 -->

<div class="screen" id="screen2">

<div class="card">

<h2>
해양안심<span class="blue">ON</span>
</h2>

<div class="toggle-on">
<div class="circle"></div>
</div>

<div class="on-text">
SAFETY ON
</div>

<div class="location">
현재 위치<br>
태안군 몽산포 해변
</div>

<button class="main-btn" onclick="showMenu()">
다음 단계
</button>

</div>
</div>

<!-- STEP3 -->

<div class="screen" id="screen3">

<div class="card">

<h2>보이는 ARS</h2>

<p style="font-size:24px;font-weight:bold;">
어떤 정보를 찾으시나요?
</p>

<button class="menu menu1" onclick="goRegion()">
<span class="num">1</span>
기상정보
</button>

<button class="menu menu2" onclick="goRegion()">
<span class="num">2</span>
해루질 위험 안내
</button>

<button class="menu menu3" onclick="goRegion()">
<span class="num">3</span>
이안류 위험 정보
</button>

<button class="menu menu4" onclick="goRegion()">
<span class="num">4</span>
풍향특보
</button>

<button class="menu menu5" onclick="goRegion()">
<span class="num">5</span>
안전수칙 안내
</button>

<button class="sos-btn" onclick="voiceScreen()">
🚨 0 긴급 SOS 연결
</button>

</div>
</div>

<!-- STEP4 -->

<div class="screen" id="screen4">

<div class="card">

<h2>지역 선택</h2>

<button class="menu menu1" onclick="showDangerScreen()">
<span class="num">1</span>
동해
</button>

<button class="menu menu1" onclick="showDangerScreen()">
<span class="num">2</span>
서해
</button>

<button class="menu menu1" onclick="showDangerScreen()">
<span class="num">3</span>
남해
</button>

<button class="menu menu1" onclick="showDangerScreen()">
<span class="num">4</span>
제주
</button>

</div>
</div>

<!-- STEP5 -->

<div class="screen" id="screen5">

<div class="card">

<h2>AI 위험 안내</h2>

<div class="warning-box">
주의
</div>

<div class="info">

🌡 기온 : 18°C<br><br>
💨 풍속 : 5m/s<br><br>
🌊 파고 : 0.6m<br><br>
☔ 강수확률 : 20%

</div>

<div class="danger">

⚠ 만조 예정으로<br>
1시간 후 고립 위험 가능성이 있습니다.

</div>

<button class="main-btn" onclick="voiceScreen()">
음성 안내 듣기
</button>

</div>
</div>

<!-- STEP6 -->

<div class="screen" id="screen6">

<div class="card">

<h2>음성 안내</h2>

<div class="voice-icon">
🎤
</div>

<p style="font-size:24px;line-height:2;">

현재 태안 몽산포 해변은<br>
풍속 5m/s이며<br>
파고는 0.6m입니다.<br><br>

해루질 활동 시 주의가 필요합니다.

</p>

<button class="main-btn" onclick="playVoice()">
다시 듣기
</button>

</div>
</div>

<script>

function hideAll(){

document.querySelectorAll(".screen").forEach(screen=>{
screen.style.display="none";
});

}

function startSafety(){

hideAll();
document.getElementById("screen2").style.display="block";

}

function showMenu(){

hideAll();
document.getElementById("screen3").style.display="block";

}

function goRegion(){

hideAll();
document.getElementById("screen4").style.display="block";

}

function showDangerScreen(){

hideAll();
document.getElementById("screen5").style.display="block";

}

function voiceScreen(){

hideAll();
document.getElementById("screen6").style.display="block";

playVoice();

}

function playVoice(){

const msg = new SpeechSynthesisUtterance(
"현재 태안 몽산포 해변은 풍속 5미터 퍼 세크이며 파고는 0점 6미터입니다. 해루질 활동 시 주의가 필요합니다."
);

msg.lang = "ko-KR";

speechSynthesis.speak(msg);

}

</script>

</body>
</html>
